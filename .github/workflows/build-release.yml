name: Build Release

on:
  push:
    tags:
      - 'desktop/**'

jobs:
  build-windows:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up build environment
        uses: actions/setup-go@v5
        with:
          go-version: '1.25.4'
      
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: desktop/frontend/package-lock.json

      - name: Install NSIS
        run: |
          Invoke-Expression (New-Object System.Net.WebClient).DownloadString('https://get.scoop.sh')
          scoop bucket add extras
          scoop install nsis
          # Add Scoop shims to PATH so makensis is available
          $scoopShims = "$env:USERPROFILE\scoop\shims"
          echo "$scoopShims" >> $env:GITHUB_PATH
          Write-Host "Added $scoopShims to PATH"
          # Verify makensis is available (will be in PATH in next steps)
          $makensisPath = "$env:USERPROFILE\scoop\apps\nsis\current\makensis.exe"
          if (Test-Path $makensisPath) {
            Write-Host "NSIS installed at: $makensisPath"
          } else {
            Write-Warning "makensis.exe not found at expected path, but shims should make it available"
          }

      - name: Install Wails CLI
        run: |
          go install github.com/wailsapp/wails/v2/cmd/wails@latest
          echo "$env:USERPROFILE\go\bin" >> $env:GITHUB_PATH

      - name: Extract version from release tag
        id: get_version
        run: |
          $tag = "${{ github.ref_name }}"
          # Remove 'desktop/v' prefix if present
          $version = $tag -replace '^desktop/v', ''
          echo "version=$version" >> $env:GITHUB_OUTPUT
          echo "Extracted version: $version"

      - name: Update version in wails.json
        working-directory: desktop
        run: |
          $version = "${{ steps.get_version.outputs.version }}"
          $json = Get-Content wails.json | ConvertFrom-Json
          $json.info.productVersion = $version
          $json | ConvertTo-Json -Depth 10 | Set-Content wails.json
          Write-Host "Updated version to: $version"

      - name: Install frontend dependencies
        working-directory: desktop/frontend
        run: npm ci

      - name: Build application and installer
        working-directory: desktop
        run: |
          # Verify makensis is in PATH
          $makensis = Get-Command makensis -ErrorAction SilentlyContinue
          if ($makensis) {
            Write-Host "makensis found at: $($makensis.Source)"
          } else {
            Write-Error "makensis not found in PATH"
            Write-Host "Current PATH: $env:PATH"
            exit 1
          }
          wails build --nsis

      - name: Find installer
        id: find_installer
        working-directory: desktop
        run: |
          # List all files in build/bin for debugging
          Write-Host "Files in build/bin:"
          Get-ChildItem -Path "build\bin" -Recurse | Format-Table Name, FullName, Length
          
          # The installer is created in build/bin with pattern: "Keyboard Sounds Pro-{ARCH}-installer.exe"
          # Exclude the main application executable (which doesn't have "installer" in the name)
          $allExes = Get-ChildItem -Path "build\bin" -Filter "*.exe" -Recurse
          Write-Host "All .exe files found:"
          $allExes | Format-Table Name, FullName, Length
          
          # Find installer - it should contain "installer" in the name
          $installer = $allExes | Where-Object { $_.Name -like "*installer*" } | Select-Object -First 1
          
          if (-not $installer) {
            Write-Error "Installer not found in build/bin. Expected pattern: *installer*.exe"
            Write-Host "Available .exe files:"
            $allExes | ForEach-Object { Write-Host "  - $($_.Name)" }
            exit 1
          }
          
          # Convert to relative path from workspace root (action expects this)
          $workspaceRoot = $env:GITHUB_WORKSPACE
          $fullPath = $installer.FullName
          $relativePath = $fullPath.Replace($workspaceRoot, "").TrimStart('\').Replace('\', '/')
          
          echo "installer_path=$relativePath" >> $env:GITHUB_OUTPUT
          echo "installer_name=$($installer.Name)" >> $env:GITHUB_OUTPUT
          Write-Host "Found installer: $fullPath"
          Write-Host "Relative path: $relativePath"
          Write-Host "File size: $($installer.Length) bytes"

      - name: Rename installer
        id: rename_installer
        working-directory: desktop
        run: |
          $installerPath = "${{ steps.find_installer.outputs.installer_path }}"
          $workspaceRoot = $env:GITHUB_WORKSPACE
          $fullPath = Join-Path $workspaceRoot $installerPath
          
          if (-not (Test-Path $fullPath)) {
            Write-Error "Installer not found at: $fullPath"
            exit 1
          }
          
          # Rename to the desired name
          $newName = "Keyboard-Sounds-Pro-Installer-Windows-amd64.exe"
          $newPath = Join-Path (Split-Path $fullPath -Parent) $newName
          
          Move-Item -Path $fullPath -Destination $newPath -Force
          
          # Calculate relative path for upload
          $relativePath = $newPath.Replace($workspaceRoot, "").TrimStart('\').Replace('\', '/')
          
          echo "installer_path=$relativePath" >> $env:GITHUB_OUTPUT
          Write-Host "Renamed installer to: $newName"
          Write-Host "New path: $relativePath"

      - name: Upload installer to release
        uses: softprops/action-gh-release@v1
        with:
          files: ${{ steps.rename_installer.outputs.installer_path }}
          tag_name: ${{ github.ref_name }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-debian:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up build environment
        uses: actions/setup-go@v5
        with:
          go-version: "1.25.4"

      - name: Install Wails
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Clean / Update apt cache
        run: sudo rm -rf /var/lib/apt/lists/* ; sudo apt-get clean ; sudo apt-get update -o Acquire::Retries=3

      - name: Install libwebkit2gtk-4.1-dev
        run: sudo apt install libwebkit2gtk-4.1-dev

      - name: Install alsa
        run: sudo apt install libasound2-dev

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: desktop/frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: desktop/frontend
        run: npm ci

      - name: Extract version from release tag
        id: get_version
        shell: bash
        run: |
          tag="${{ github.ref_name }}"
          version="${tag#desktop/v}"
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "Extracted version: $version"

      - name: Build deb package
        working-directory: desktop
        run: ./build-deb.sh ${{ steps.get_version.outputs.version }}

      - name: Rename deb package
        run: mv desktop/build/kbs-pro_${{ steps.get_version.outputs.version }}_amd64.deb desktop/build/Keyboard-Sounds-Pro-Installer-Linux-amd64.deb

      - name: Upload deb package to release
        uses: softprops/action-gh-release@v1
        with:
          files: desktop/build/Keyboard-Sounds-Pro-Installer-Linux-amd64.deb
          tag_name: ${{ github.ref_name }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-redhat:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up build environment
        uses: actions/setup-go@v5
        with:
          go-version: "1.25.4"

      - name: Install Wails
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Clean / Update apt cache
        run: sudo rm -rf /var/lib/apt/lists/* ; sudo apt-get clean ; sudo apt-get update -o Acquire::Retries=3

      - name: Install libwebkit2gtk-4.1-dev
        run: sudo apt install libwebkit2gtk-4.1-dev

      - name: Install alsa
        run: sudo apt install libasound2-dev

      - name: Install rpm-build
        run: sudo apt install rpm

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: desktop/frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: desktop/frontend
        run: npm ci

      - name: Extract version from release tag
        id: get_version
        shell: bash
        run: |
          tag="${{ github.ref_name }}"
          version="${tag#desktop/v}"
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "Extracted version: $version"

      - name: Build rpm package
        working-directory: desktop
        run: ./build-rpm.sh ${{ steps.get_version.outputs.version }}

      - name: Rename rpm package
        run: mv desktop/build/kbs-pro-${{ steps.get_version.outputs.version }}-1.x86_64.rpm desktop/build/Keyboard-Sounds-Pro-Installer-Linux-x86_64.rpm

      - name: Upload rpm package to release
        uses: softprops/action-gh-release@v1
        with:
          files: desktop/build/Keyboard-Sounds-Pro-Installer-Linux-x86_64.rpm
          tag_name: ${{ github.ref_name }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-macos:
    runs-on: macos-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25.4"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: desktop/frontend/package-lock.json

      - name: Install Wails CLI
        run: |
          go install github.com/wailsapp/wails/v2/cmd/wails@latest
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

      - name: Install frontend dependencies
        working-directory: desktop/frontend
        run: npm ci

      - name: Extract version from release tag
        id: get_version
        shell: bash
        run: |
          tag="${{ github.ref_name }}"
          version="${tag#desktop/v}"
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "Extracted version: $version"

      - name: Import code signing certificate
        env:
          MACOS_CERTIFICATE_P12_BASE64: ${{ secrets.MACOS_CERTIFICATE_P12_BASE64 }}
          MACOS_CERTIFICATE_PASSWORD: ${{ secrets.MACOS_CERTIFICATE_PASSWORD }}
        run: |
          if [ -z "${MACOS_CERTIFICATE_P12_BASE64:-}" ] || [ -z "${MACOS_CERTIFICATE_PASSWORD:-}" ]; then
            echo "Missing secrets: set MACOS_CERTIFICATE_P12_BASE64 and MACOS_CERTIFICATE_PASSWORD for release builds."
            exit 1
          fi
          KEYCHAIN_PATH="$RUNNER_TEMP/signing.keychain-db"
          KEYCHAIN_PASSWORD=$(openssl rand -base64 32)
          echo -n "$MACOS_CERTIFICATE_P12_BASE64" | base64 --decode > "$RUNNER_TEMP/certificate.p12"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$RUNNER_TEMP/certificate.p12" -P "$MACOS_CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH"
          security default-keychain -s "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

      - name: Build and notarize macOS DMG
        working-directory: desktop
        env:
          NOTARIZE_APPLE_ID: ${{ secrets.NOTARIZE_APPLE_ID }}
          NOTARIZE_APP_SPECIFIC_PASSWORD: ${{ secrets.NOTARIZE_APP_SPECIFIC_PASSWORD }}
          NOTARIZE_TEAM_ID: ${{ secrets.NOTARIZE_TEAM_ID }}
          DEVELOPER_ID_APPLICATION: ${{ secrets.DEVELOPER_ID_APPLICATION }}
        run: |
          if [ -z "${DEVELOPER_ID_APPLICATION:-}" ]; then
            unset DEVELOPER_ID_APPLICATION
          fi
          ./build-macos-direct.sh "${{ steps.get_version.outputs.version }}"

      - name: Rename DMG for release
        run: |
          mv "desktop/build/bin/Keyboard-Sounds-Pro-${{ steps.get_version.outputs.version }}.dmg" \
            "desktop/build/bin/Keyboard-Sounds-Pro-Installer-macOS-universal.dmg"

      - name: Upload DMG to release
        uses: softprops/action-gh-release@v1
        with:
          files: desktop/build/bin/Keyboard-Sounds-Pro-Installer-macOS-universal.dmg
          tag_name: ${{ github.ref_name }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
